name: CI

on:
  push:
    branches: [ main, develop, ci-fix ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-editable-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    name: Test Python ${{ matrix.python-version }} (editable install)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libqhull-dev

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install scikit-build-core cmake ninja

      - name: Install package (editable install with test dependencies)
        run: |
          cd python
          pip install --no-build-isolation -e ".[test]"

      - name: Run pytest
        run: |
          cd python
          pytest tests/ -v

  cpp-build-test:
    runs-on: ubuntu-latest
    name: Build and test C++ library
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 1

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libqhull-dev

      - name: Configure CMake (Release + tests)
        run: |
          cmake -S . -B build-ci -DCMAKE_BUILD_TYPE=Release -DDGD_BUILD_TESTS=ON

      - name: Build C++ targets
        run: |
          cmake --build build-ci --parallel

      - name: Run C++ unit tests
        run: |
          ctest --test-dir build-ci --output-on-failure

  cpp-coverage:
    runs-on: ubuntu-latest
    name: C++ code coverage (core library)
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 1

      - name: Install native dependencies and coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libqhull-dev gcovr

      - name: Configure CMake (Debug + coverage)
        run: |
          cmake -S . -B build-cov -DCMAKE_BUILD_TYPE=Debug -DDGD_BUILD_TESTS=ON -DDGD_ENABLE_COVERAGE=ON

      - name: Build C++ targets
        run: |
          cmake --build build-cov --parallel

      - name: Run C++ unit tests
        run: |
          ctest --test-dir build-cov --output-on-failure

      - name: Generate coverage reports
        run: |
          gcovr \
            --root "${{ github.workspace }}" \
            --object-directory build-cov \
            --filter "${{ github.workspace }}/src" \
            --filter "${{ github.workspace }}/include" \
            --exclude ".*/tests/.*" \
            --exclude ".*/benchmarks/.*" \
            --exclude ".*/external/.*" \
            --exclude ".*/build.*/.*" \
            --cobertura build-cov/coverage.xml \
            --txt build-cov/coverage.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-coverage-report
          path: |
            build-cov/coverage.xml
            build-cov/coverage.txt
          retention-days: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build-cov/coverage.xml
          flags: cpp
          name: cpp-core-coverage
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    name: Lint and code quality
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files
        continue-on-error: true
